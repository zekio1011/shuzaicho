<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>取材帳</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="取材帳">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;color:#111;background:#f6f6f6}
body{max-width:900px;margin:0 auto;padding:18px 14px 80px}
h1{font-size:30px;margin:18px 0 4px}.sub{color:#666}.version{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:4px 10px;font-size:12px}
.panel,.card{background:white;border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 4px 18px rgba(0,0,0,.06)}
input,textarea,select{box-sizing:border-box;width:100%;font-size:16px;margin:6px 0;padding:12px;border:1px solid #ddd;border-radius:12px;background:#fff}
textarea{min-height:88px}button{font-size:16px;border:0;border-radius:12px;padding:11px 14px;margin:6px 4px 0 0;background:#111;color:white}
button.secondary{background:#e9e9e9;color:#111}button.danger{background:#ffe8e8;color:#b00020}.hidden{display:none}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.badge{display:inline-block;background:#eee;border-radius:999px;padding:4px 9px;margin:4px 4px 4px 0;font-size:13px}
.meta{color:#555;font-size:14px;line-height:1.7}pre{white-space:pre-wrap;font-family:inherit;background:#f7f7f7;padding:10px;border-radius:10px}
.search{position:sticky;top:0;background:#f6f6f6;padding-top:8px;z-index:2}.empty{color:#777;text-align:center;padding:28px}
.filters{display:flex;gap:7px;overflow:auto;padding:6px 0 10px}.filters button{white-space:nowrap;font-size:14px;padding:8px 11px}
button.active{outline:3px solid #111;background:#fff;color:#111}.notice{background:#fff7d6;border:1px solid #f0d56b;border-radius:14px;padding:10px;margin:10px 0;font-size:14px}
.editing{background:#e9f3ff;border:1px solid #8bbcff;border-radius:14px;padding:10px;margin:8px 0;font-size:14px}
</style>
</head>
<body>
<h1>取材帳</h1>
<div class="version">v6 編集・曜日インデックス版</div>
<p class="sub">登録者名・月〜金インデックス・編集機能つき</p>

<div class="panel">
  <b id="loginStatus">未ログイン</b>
  <div id="userInfo" style="font-size:13px;color:#555">ログインすると共有データを表示します</div>
  <div id="authForm">
    <input id="displayName" placeholder="あなたの名前（登録者名）例：天音">
    <input id="email" type="email" placeholder="メールアドレス">
    <input id="password" type="password" placeholder="パスワード（6文字以上）">
    <button id="signupBtn" type="button">新規登録</button>
    <button id="loginBtn" type="button">ログイン</button>
  </div>
  <button id="logoutBtn" class="secondary hidden" type="button">ログアウト</button>
</div>

<div id="appArea" class="hidden">
  <div class="notice">登録・編集した内容は同じURLを開いたログインユーザーにも表示されます。</div>
  <div class="search">
    <input id="q" placeholder="検索：名前・所属・タグ・メモ・登録者">
    <div id="weekdayFilters" class="filters"></div>
  </div>

  <div class="panel">
    <div id="editingNotice" class="editing hidden">編集中：既存データを上書きします</div>
    <input id="contactName" placeholder="名前">
    <input id="org" placeholder="所属・肩書き">
    <div class="row"><input id="phone" placeholder="電話番号"><input id="mail" placeholder="取材先メール"></div>
    <input id="sns" placeholder="SNS / URL">
    <input id="tag" placeholder="専門分野タグ 例：洞窟, 気象, 医療">
    <div class="row">
      <select id="weekday"><option value="">曜日未設定</option><option value="月">月曜</option><option value="火">火曜</option><option value="水">水曜</option><option value="木">木曜</option><option value="金">金曜</option></select>
      <select id="contactStatus"><option>未連絡</option><option>連絡済</option><option>返信待ち</option><option>取材OK</option><option>NG</option></select>
    </div>
    <div class="row"><input id="lastDate" type="date"><input id="nextDate" type="date"></div>
    <input id="registrantName" placeholder="登録者名 例：天音">
    <textarea id="memo" placeholder="メモ・NG条件・聞きたいこと"></textarea>
    <button id="saveBtn" type="button">登録</button>
    <button id="cancelEditBtn" class="secondary hidden" type="button">編集キャンセル</button>
    <button id="csvBtn" class="secondary" type="button">CSV出力</button>
  </div>

  <h2>登録一覧</h2><div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
(function(){
  if("serviceWorker" in navigator) navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
  const firebaseConfig={apiKey:"AIzaSyBvmUFOEdgNwJoDLLtIITOdFbaUcXF6L7A",authDomain:"shuzaicho-team.firebaseapp.com",projectId:"shuzaicho-team",storageBucket:"shuzaicho-team.firebasestorage.app",messagingSenderId:"343514004414",appId:"1:343514004414:web:fe444415a36f09be3517ef"};
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth(), db=firebase.firestore(), contactsRef=db.collection("contacts"), $=id=>document.getElementById(id);
  let data=[], unsubscribe=null, editingId=null, weekdayFilter="すべて";
  const weekdays=["すべて","月","火","水","木","金","未設定"];
  $("displayName").value=localStorage.getItem("shuzaicho_display_name")||"";

  function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  function buildFilters(){const box=$("weekdayFilters");box.innerHTML="";weekdays.forEach(w=>{const b=document.createElement("button");b.type="button";b.textContent=w==="すべて"?"全部":w==="未設定"?"未設定":w+"曜";b.className="secondary"+(weekdayFilter===w?" active":"");b.onclick=()=>{weekdayFilter=w;buildFilters();render()};box.appendChild(b);});}
  async function signup(){try{if(!$("email").value||!$("password").value){alert("メールとパスワードを入れてね");return}localStorage.setItem("shuzaicho_display_name",$("displayName").value.trim());await auth.createUserWithEmailAndPassword($("email").value.trim(),$("password").value)}catch(e){alert("新規登録エラー："+e.message)}}
  async function login(){try{if(!$("email").value||!$("password").value){alert("メールとパスワードを入れてね");return}localStorage.setItem("shuzaicho_display_name",$("displayName").value.trim());await auth.signInWithEmailAndPassword($("email").value.trim(),$("password").value)}catch(e){alert("ログインエラー："+e.message)}}
  function loggedIn(user){$("loginStatus").textContent="ログイン中";$("userInfo").textContent=user.email||"";$("authForm").classList.add("hidden");$("logoutBtn").classList.remove("hidden");$("appArea").classList.remove("hidden");if(!$("registrantName").value)$("registrantName").value=localStorage.getItem("shuzaicho_display_name")||"";buildFilters();if(unsubscribe)unsubscribe();unsubscribe=contactsRef.orderBy("createdAt","desc").onSnapshot(snap=>{data=snap.docs.map(doc=>({id:doc.id,...doc.data()}));render()},e=>alert("データ取得エラー："+e.message));}
  function loggedOut(){$("loginStatus").textContent="未ログイン";$("userInfo").textContent="ログインすると共有データを表示します";$("authForm").classList.remove("hidden");$("logoutBtn").classList.add("hidden");$("appArea").classList.add("hidden");if(unsubscribe)unsubscribe();data=[];render();}
  function formData(){const user=auth.currentUser;const reg=$("registrantName").value.trim()||$("displayName").value.trim()||(user?user.email:"");return{name:$("contactName").value.trim(),org:$("org").value.trim(),phone:$("phone").value.trim(),mail:$("mail").value.trim(),sns:$("sns").value.trim(),tag:$("tag").value.trim(),weekday:$("weekday").value,lastDate:$("lastDate").value,nextDate:$("nextDate").value,status:$("contactStatus").value,memo:$("memo").value.trim(),registrantName:reg,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedByEmail:user.email||""};}
  async function saveItem(){const user=auth.currentUser;if(!user){alert("先にログインしてね");return}const item=formData();if(!item.name){alert("名前を入れてね");return}localStorage.setItem("shuzaicho_display_name",item.registrantName);if(editingId){await contactsRef.doc(editingId).update(item);cancelEdit()}else{await contactsRef.add({...item,createdAt:firebase.firestore.FieldValue.serverTimestamp(),createdByEmail:user.email||"",createdByName:item.registrantName});clearForm();}}
  function clearForm(){["contactName","org","phone","mail","sns","tag","lastDate","nextDate","memo"].forEach(id=>$(id).value="");$("weekday").value="";$("contactStatus").value="未連絡";}
  function startEdit(x){editingId=x.id;$("contactName").value=x.name||"";$("org").value=x.org||"";$("phone").value=x.phone||"";$("mail").value=x.mail||"";$("sns").value=x.sns||"";$("tag").value=x.tag||"";$("weekday").value=x.weekday||"";$("lastDate").value=x.lastDate||"";$("nextDate").value=x.nextDate||"";$("contactStatus").value=x.status||"未連絡";$("registrantName").value=x.registrantName||x.createdByName||"";$("memo").value=x.memo||"";$("saveBtn").textContent="更新";$("cancelEditBtn").classList.remove("hidden");$("editingNotice").classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"});}
  function cancelEdit(){editingId=null;clearForm();$("saveBtn").textContent="登録";$("cancelEditBtn").classList.add("hidden");$("editingNotice").classList.add("hidden");}
  async function del(id){if(confirm("削除する？"))await contactsRef.doc(id).delete();}
  function render(){const list=$("list");if(!list)return;const q=($("q").value||"").toLowerCase();let filtered=data.filter(x=>JSON.stringify(x).toLowerCase().includes(q));if(weekdayFilter!=="すべて"){filtered=weekdayFilter==="未設定"?filtered.filter(x=>!x.weekday):filtered.filter(x=>x.weekday===weekdayFilter)}list.innerHTML="";if(!filtered.length){list.innerHTML='<div class="empty">まだ登録がないよ</div>';return}filtered.forEach(x=>{const tags=(x.tag||"").split(",").map(t=>t.trim()).filter(Boolean).map(t=>`<span class="badge">${esc(t)}</span>`).join("");const phone=x.phone?`<a href="tel:${esc(x.phone)}">${esc(x.phone)}</a>`:"";const mail=x.mail?`<a href="mailto:${esc(x.mail)}">${esc(x.mail)}</a>`:"";const reg=x.registrantName||x.createdByName||x.createdByEmail||"不明";const div=document.createElement("div");div.className="card";div.innerHTML=`<h3>${esc(x.name)}</h3><div class="meta">${esc(x.org)}<br>曜日: <b>${esc(x.weekday||"未設定")}</b><br>📞 ${phone}<br>✉️ ${mail}<br>🔗 ${esc(x.sns)}<br>🗓️ 最終連絡日: ${esc(x.lastDate||"未設定")} / 次回: ${esc(x.nextDate||"未設定")}<br>状態: <b>${esc(x.status)}</b><br>登録者: ${esc(reg)}</div><div>${tags}</div><pre>${esc(x.memo)}</pre><button class="secondary editBtn" type="button">編集</button><button class="danger delBtn" type="button">削除</button>`;div.querySelector(".editBtn").onclick=()=>startEdit(x);div.querySelector(".delBtn").onclick=()=>del(x.id);list.appendChild(div);});}
  function exportCSV(){const headers=["名前","所属・肩書き","曜日","電話番号","メール","SNS","タグ","最終連絡日","次回連絡日","状態","メモ","登録者名","登録者メール"];const rows=data.map(x=>[x.name,x.org,x.weekday,x.phone,x.mail,x.sns,x.tag,x.lastDate,x.nextDate,x.status,x.memo,x.registrantName||x.createdByName,x.createdByEmail]);const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v||"").replaceAll('"','""')}"`).join(",")).join("\\n");const blob=new Blob(["\\ufeff"+csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="取材帳.csv";a.click();URL.revokeObjectURL(url);}
  $("signupBtn").onclick=signup;$("loginBtn").onclick=login;$("logoutBtn").onclick=()=>auth.signOut();$("saveBtn").onclick=saveItem;$("cancelEditBtn").onclick=cancelEdit;$("csvBtn").onclick=exportCSV;$("q").oninput=render;auth.onAuthStateChanged(user=>user?loggedIn(user):loggedOut());
})();
</script>
</body>
</html>
